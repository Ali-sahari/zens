<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        "use strict";

        // 1. القفل الفوري (إخفاء الصفحة فوراً)
        document.documentElement.style.display = "none";

        const poisonPage = () => {
          document.body.innerHTML =
            '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;color:#ff0000;font-family:sans-serif;direction:rtl;"><h1>⚠️ تم قفل الوصول لحماية المحتوى</h1></div>';
          window.location.replace("about:blank");
        };

        // 2. نظام "الألغام اللحظية" (الدمج بين الفحص والـ Debugger)
        const checkSecurity = () => {
          const start = performance.now();
          debugger;
          const end = performance.now();
          if (end - start > 50) return poisonPage();

          const threshold = 160;
          if (
            window.outerWidth - window.innerWidth > threshold ||
            window.outerHeight - window.innerHeight > threshold
          ) {
            poisonPage();
          }
        };

        // 3. مستمعات الأحداث (المنع الشامل)
        const preventAll = (e) => e.preventDefault();

        [
          "contextmenu",
          "selectstart",
          "dragstart",
          "copy",
          "cut",
          "paste",
        ].forEach((event) => {
          document.addEventListener(event, preventAll);
        });

        // 4. منع الاختصارات (F12, Ctrl+Shift+I/J/C, Ctrl+U, Ctrl+S, Ctrl+P)
        window.addEventListener(
          "keydown",
          (e) => {
            // الأكواد: 123=F12, 73=I, 74=J, 67=C, 85=U, 83=S, 80=P, 118=F6
            const forbiddenKeys = [123, 73, 74, 67, 85, 83, 80, 118];
            const isMetaKey = e.ctrlKey || e.shiftKey || e.altKey || e.metaKey;

            if (
              forbiddenKeys.includes(e.keyCode) ||
              (isMetaKey && forbiddenKeys.includes(e.keyCode)) ||
              (e.ctrlKey && e.shiftKey && e.keyCode === 73) // Ctrl+Shift+I
            ) {
              e.preventDefault();
              poisonPage();
              return false;
            }
          },
          true,
        );

        // 5. تشغيل الفحص الدوري
        setInterval(checkSecurity, 100);

        // 6. تعطيل الكونسول وتصفيتها
        if (typeof console !== "undefined") {
          ["log", "debug", "info", "warn", "error", "clear"].forEach(
            (method) => {
              console[method] = () => {};
            },
          );
          setInterval(() => console.clear(), 10);
        }

        // 7. منع الـ Iframe
        if (window.self !== window.top)
          window.top.location = window.self.location;

        // 8. الإظهار المشروط
        window.onload = () => {
          checkSecurity();
          document.documentElement.style.display = "block";
        };

        window.onresize = checkSecurity;
      })();
    </script>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <link rel="icon" type="image/svg+xml" href="./src/assets/logo1.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zens</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
